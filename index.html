<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Processamento de Imagens</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="main-container">
        <h1>Processamento de Imagens</h1>

        <div class="main-row">
            <div class="image-block">
                <h3>Imagem 1 (Original)</h3>
                <canvas id="canvasInput1"></canvas>
                <input type="file" id="uploadImage1" accept="image/*" />
            </div>

            <div class="image-block">
                <h3>Imagem 2 (Opcional)</h3>
                <canvas id="canvasInput2"></canvas>
                <input type="file" id="uploadImage2" accept="image/*" />
                <label class="checkbox-row">
                    <input type="checkbox" id="enableImage2" checked />
                    Usar Imagem 2
                </label>
            </div>

            <div class="image-block">
                <h3>Resultado</h3>
                <canvas id="canvasOutput"></canvas>
                <button id="saveBtn" class="btn btn-blue">Salvar Resultado</button>
            </div>

            <div class="operation-panel">
                <h3>Operações Aritmeticas</h3>

                <div class="operation-row">
                    <label>Adição:</label>
                    <input type="number" id="intensityAddInput" min="0" max="255" value="0" />
                    <button id="addBtn" class="btn btn-green">Aplicar</button>
                </div>

                <div class="operation-row">
                    <label>Subtração:</label>
                    <input type="number" id="intensitySubInput" min="0" max="255" value="0" />
                    <button id="subBtn" class="btn btn-green">Aplicar</button>
                </div>

                <div class="operation-row">
                    <label>Multiplicação:</label>
                    <input type="number" id="intensityMultInput" min="0" step="0.1" value="1" />
                    <button id="multBtn" class="btn btn-green">Aplicar</button>
                </div>

                <div class="operation-row">
                    <label>Divisão:</label>
                    <input type="number" id="intensityDivInput" min="0.1" step="0.1" value="1" />
                    <button id="divBtn" class="btn btn-green">Aplicar</button>
                </div>
            </div>
            <div class="filters-panel">
                <h3>Filtros</h3>

                <div class="filter-row">
                    <label>Escala de Cinza</label>
                    <button id="grayscaleBtn" class="btn btn-green">Aplicar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="classes/ImageProcessor.js"></script>
    <script src="main.js"></script>
</body>

</html>
