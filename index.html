<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Processamento de Imagens</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container-principal">
        <h1>Processamento de Imagens</h1>

        <div class="linha-principal">
            <div class="bloco-imagem">
                <h3>Imagem 1 (Original)</h3>
                <canvas id="telaEntrada1"></canvas>
                <input type="file" id="enviarImagem1" accept="image/*" />
            </div>

            <div class="bloco-imagem">
                <h3>Imagem 2 (Opcional)</h3>
                <canvas id="telaEntrada2"></canvas>
                <input type="file" id="enviarImagem2" accept="image/*" />
                <label class="linha-checkbox">
                    <input type="checkbox" id="habilitarImagem2" checked />
                    Usar Imagem 2
                </label>
            </div>

            <div class="bloco-imagem">
                <h3>Resultado</h3>
                <canvas id="telaResultado"></canvas>
                <button id="btnSalvar" class="btn btn-azul">Salvar Resultado</button>
            </div>

            <div class="painel-operacoes">
                <h3>Operações Aritméticas</h3>

                <div class="linha-operacao">
                    <label>Adição:</label>
                    <input type="number" id="Adicao" min="0" max="255" value="0" />
                    <button id="btnAdicao" class="btn btn-verde">Aplicar</button>
                </div>

                <div class="linha-operacao">
                    <label>Subtração:</label>
                    <input type="number" id="Subtracao" min="0" max="255" value="0" />
                    <button id="btnSubtracao" class="btn btn-verde">Aplicar</button>
                </div>

                <div class="linha-operacao">
                    <label>Multiplicação:</label>
                    <input type="number" id="Multiplicacao" min="0" step="0.1" value="1" />
                    <button id="btnMultiplicacao" class="btn btn-verde">Aplicar</button>
                </div>

                <div class="linha-operacao">
                    <label>Divisão:</label>
                    <input type="number" id="Divisao" min="0.1" step="0.1" value="1" />
                    <button id="btnDivisao" class="btn btn-verde">Aplicar</button>
                </div>
            </div>

            <div class="painel-filtros">
                <h3>Filtros</h3>

                <div class="linha-filtro">
                    <label>Escala de Cinza:</label>
                    <button id="btnEscalaCinza" class="btn btn-verde">Aplicar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="classes/ImageProcessor.js"></script>
    <script src="main.js"></script>
</body>

</html>
